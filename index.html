<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <title>Card FrontendMentor</title>
</head>
<body>
    <main>
        <img src="illustration-hero.svg" class="hero">
        <div class="conteudo">
            <h3>Order Summary</h3>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
        </div>
        <div class="container">
            <img src="icon-music.svg" class="icon-musica">
            <div class="palavras">
                <h4>Annual Plan</h4>
                <p>$59.99/year</p>
            </div>
            <a href="#" class="change">Change</a>
        </div>
        <button class="proceder-pagamento">Proceed to Payment</button>
        <button class="cancelar">Cancel Order</button>
    </main>
</body>
</html>
